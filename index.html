<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محلل شخصية X</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#07070f; --s1:#0e0e1a; --s2:#13131f;
    --border:#1d1d2e; --border2:#262638;
    --accent:#6d28d9; --accent2:#a78bfa; --cyan:#22d3ee;
    --text:#e2e8f0; --muted:#64748b; --muted2:#94a3b8; --red:#f87171;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;min-height:100vh;overflow-x:hidden;}
  body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 80% 10%,rgba(109,40,217,.08) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 10% 80%,rgba(34,211,238,.06) 0%,transparent 60%);pointer-events:none;z-index:0;}
  .wrap{max-width:680px;margin:0 auto;padding:40px 18px 80px;position:relative;z-index:1;}

  /* Header */
  .hd{text-align:center;margin-bottom:44px;animation:fd .7s ease;}
  .badge{display:inline-flex;align-items:center;gap:7px;background:var(--s1);border:1px solid var(--border2);border-radius:50px;padding:6px 18px;margin-bottom:22px;font-size:11px;letter-spacing:2.5px;color:var(--accent2);font-family:'Space Mono',monospace;}
  .dot{width:5px;height:5px;background:var(--accent2);border-radius:50%;animation:pulse 2s infinite;}
  h1{font-size:clamp(30px,6vw,50px);font-weight:900;line-height:1.15;margin-bottom:10px;}
  h1 em{font-style:normal;background:linear-gradient(120deg,#a78bfa,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .sub{color:var(--muted);font-size:16px;font-weight:300;}

  /* Input card */
  .card{background:var(--s1);border:1px solid var(--border);border-radius:22px;padding:32px 28px;}
  .u-label{font-size:13px;color:var(--accent2);font-weight:600;letter-spacing:.5px;margin-bottom:14px;display:block;}
  .u-field{display:flex;align-items:center;gap:10px;background:var(--s2);border:2px solid var(--border);border-radius:14px;padding:16px 20px;transition:border-color .3s;margin-bottom:20px;}
  .u-field:focus-within{border-color:var(--accent2);}
  .at{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;color:var(--accent2);}
  .u-input{background:transparent;border:none;outline:none;color:var(--text);font-family:'Space Mono',monospace;font-size:20px;flex:1;direction:ltr;}
  .u-input::placeholder{color:var(--muted);}

  .btn{width:100%;padding:18px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff;font-family:'Tajawal',sans-serif;font-size:18px;font-weight:700;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;}
  .btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#7c3aed,var(--cyan));opacity:0;transition:opacity .3s;}
  .btn:hover::after{opacity:1;}
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(109,40,217,.4);}
  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}
  .btn-inner{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:8px;}

  .err{display:none;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);border-radius:12px;padding:13px 18px;color:var(--red);font-size:14px;text-align:center;margin-top:14px;}
  .err.on{display:block;}

  /* Loading */
  .loading{display:none;text-align:center;padding:60px 20px;}
  .loading.on{display:block;}
  .ring{width:80px;height:80px;border-radius:50%;border:3px solid var(--border2);border-top-color:var(--accent2);animation:spin 1s linear infinite;margin:0 auto 24px;}
  .loading-label{color:var(--accent2);font-size:16px;font-weight:600;margin-bottom:18px;}
  .loading-steps{display:flex;flex-direction:column;gap:10px;align-items:center;}
  .lstep{font-size:14px;color:var(--muted);transition:all .4s;}
  .lstep.on{color:var(--accent2);font-weight:600;}

  /* Results */
  .results{display:none;}
  .results.on{display:block;animation:fu .6s ease;}

  .r-header{background:linear-gradient(135deg,var(--s1),var(--s2));border:1px solid var(--border2);border-radius:22px;padding:26px;margin-bottom:14px;position:relative;overflow:hidden;}
  .r-header::before{content:'';position:absolute;top:-40px;left:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(109,40,217,.12),transparent 70%);}
  .r-top{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
  .avatar{width:64px;height:64px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:#fff;}
  .r-name{font-size:21px;font-weight:800;margin-bottom:3px;}
  .r-handle{font-family:'Space Mono',monospace;font-size:12px;color:var(--accent2);margin-bottom:4px;}
  .r-bio{font-size:13px;color:var(--muted);}
  .ptype{display:inline-flex;align-items:center;gap:6px;background:rgba(109,40,217,.15);border:1px solid rgba(167,139,250,.25);border-radius:50px;padding:5px 14px;font-size:13px;font-weight:600;color:var(--accent2);margin-bottom:12px;}
  .r-summary{font-size:15px;line-height:1.9;color:var(--muted2);}

  /* Stats row */
  .stats-row{display:flex;gap:10px;margin-bottom:14px;}
  .stat{flex:1;background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;}
  .stat-val{font-size:18px;font-weight:800;font-family:'Space Mono',monospace;color:var(--accent2);}
  .stat-lbl{font-size:11px;color:var(--muted);margin-top:4px;}

  .scores{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
  .sc{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:16px 12px;text-align:center;}
  .sc-lbl{font-size:11px;color:var(--muted);margin-bottom:6px;display:block;}
  .sc-val{font-size:26px;font-weight:800;font-family:'Space Mono',monospace;background:linear-gradient(135deg,#a78bfa,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .sc-bar{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;}
  .sc-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--cyan));border-radius:2px;transition:width 1.4s cubic-bezier(.4,0,.2,1);width:0;}

  .acard{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:22px;margin-bottom:12px;}
  .acard-title{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:700;margin-bottom:13px;}
  .aicon{width:30px;height:30px;border-radius:8px;background:rgba(109,40,217,.15);display:flex;align-items:center;justify-content:center;font-size:15px;}
  .atext{font-size:15px;line-height:1.9;color:var(--muted2);}
  .tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;}
  .tag{background:var(--s2);border:1px solid var(--border2);border-radius:50px;padding:4px 13px;font-size:13px;color:var(--accent2);font-weight:500;}

  .verdict{background:linear-gradient(135deg,rgba(109,40,217,.08),rgba(34,211,238,.08));border:1px solid rgba(109,40,217,.25);border-radius:20px;padding:24px;margin-bottom:12px;text-align:center;}
  .v-emoji{font-size:44px;display:block;margin-bottom:10px;}
  .v-title{font-size:20px;font-weight:800;margin-bottom:10px;background:linear-gradient(135deg,#a78bfa,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .v-text{font-size:15px;line-height:1.9;color:var(--muted2);}

  .share-btn{width:100%;padding:16px;background:var(--s1);border:1px solid var(--border2);border-radius:14px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .3s;margin-top:8px;}
  .share-btn:hover{border-color:var(--accent2);color:var(--accent2);background:var(--s2);}
  .reset-btn{width:100%;padding:13px;border:1px solid var(--border);border-radius:12px;background:transparent;color:var(--muted);font-family:'Tajawal',sans-serif;font-size:15px;cursor:pointer;transition:all .3s;margin-top:10px;}
  .reset-btn:hover{color:var(--text);border-color:var(--muted);}

  @keyframes fd{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  @media(max-width:480px){.scores{grid-template-columns:repeat(2,1fr)}.stats-row{flex-wrap:wrap}}
</style>
</head>
<body>
<div class="wrap">

  <div class="hd">
    <div class="badge"><div class="dot"></div>X PERSONALITY AI</div>
    <h1>محلل <em>شخصية X</em></h1>
    <p class="sub">اكتب أي username واحصل على تحليل كامل بالذكاء الاصطناعي</p>
  </div>

  <!-- Input -->
  <div id="inputSection">
    <div class="card">
      <span class="u-label">🔍 اكتب الـ username</span>
      <div class="u-field">
        <span class="at">@</span>
        <input class="u-input" id="unameInput" placeholder="username" dir="ltr" autocomplete="off"
          onkeydown="if(event.key==='Enter') analyze()">
      </div>
      <button class="btn" id="analyzeBtn" onclick="analyze()">
        <span class="btn-inner">⚡ &nbsp;حلّل الشخصية الآن</span>
      </button>
      <div class="err" id="errBox">⚠️ اكتب اسم الحساب أولاً</div>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="ring"></div>
    <div class="loading-label">جاري تحليل الحساب...</div>
    <div class="loading-steps">
      <div class="lstep on" id="ls0">🔍 جلب بيانات الحساب من X</div>
      <div class="lstep" id="ls1">📖 قراءة آخر التغريدات</div>
      <div class="lstep" id="ls2">🧠 تحليل الشخصية بالذكاء الاصطناعي</div>
      <div class="lstep" id="ls3">✍️ إعداد التقرير النهائي</div>
    </div>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div id="resultsHTML"></div>
    <button class="share-btn" onclick="share()">𝕏 &nbsp;شارك نتيجتك على X</button>
    <button class="reset-btn" onclick="reset()">← حلّل حساباً آخر</button>
  </div>

</div>
<script>
let lsT;
function animateLoading(){
  let i=0;
  document.querySelectorAll('.lstep').forEach(x=>x.classList.remove('on'));
  document.getElementById('ls0').classList.add('on');
  lsT=setInterval(()=>{i++;if(i<4){document.querySelectorAll('.lstep').forEach(x=>x.classList.remove('on'));document.getElementById('ls'+i).classList.add('on');}else clearInterval(lsT);},1200);
}

function fmt(n){if(!n)return'0';if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(1)+'K';return n.toString();}

async function analyze(){
  const username=document.getElementById('unameInput').value.trim().replace('@','');
  const errBox=document.getElementById('errBox');
  errBox.classList.remove('on');
  if(!username){errBox.classList.add('on');return;}

  document.getElementById('inputSection').style.display='none';
  document.getElementById('loading').classList.add('on');
  animateLoading();

  try{
    const res=await fetch('/api/analyze',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username})
    });
    const data=await res.json();
    if(data.error) throw new Error(data.error);
    clearInterval(lsT);
    showResults(data.analysis, data.profile);
  }catch(e){
    clearInterval(lsT);
    document.getElementById('loading').classList.remove('on');
    document.getElementById('inputSection').style.display='block';
    errBox.textContent='⚠️ '+(e.message||'حدث خطأ، حاول مجدداً');
    errBox.classList.add('on');
  }
}

function showResults(d, p){
  document.getElementById('loading').classList.remove('on');
  document.getElementById('results').classList.add('on');

  const scHTML=Object.entries(d.scores||{}).map(([k,v])=>
    `<div class="sc"><span class="sc-lbl">${k}</span><div class="sc-val">${v}%</div><div class="sc-bar"><div class="sc-fill" data-w="${v}"></div></div></div>`).join('');
  const tagsHTML=(d.keywords||[]).map(t=>`<span class="tag">${t}</span>`).join('');

  document.getElementById('resultsHTML').innerHTML=`
    <div class="r-header">
      <div class="r-top">
        <div class="avatar">${d.avatar_letter||'؟'}</div>
        <div>
          <div class="r-name">${p.name||'@'+p.username}</div>
          <div class="r-handle">@${p.username}</div>
          ${p.bio?`<div class="r-bio">${p.bio}</div>`:''}
        </div>
      </div>
      <div class="ptype">✦ ${d.personality_type||''}</div>
      <p class="r-summary">${d.summary||''}</p>
    </div>

    <div class="stats-row">
      <div class="stat"><div class="stat-val">${fmt(p.followers)}</div><div class="stat-lbl">متابع</div></div>
      <div class="stat"><div class="stat-val">${fmt(p.following)}</div><div class="stat-lbl">يتابع</div></div>
      <div class="stat"><div class="stat-val">${fmt(p.tweets_count)}</div><div class="stat-lbl">تغريدة</div></div>
    </div>

    <div class="scores">${scHTML}</div>
    <div class="acard"><div class="acard-title"><div class="aicon">💪</div>نقاط القوة</div><p class="atext">${d.strengths||''}</p></div>
    <div class="acard"><div class="acard-title"><div class="aicon">⚠️</div>نقاط الضعف</div><p class="atext">${d.weakness||''}</p></div>
    <div class="acard"><div class="acard-title"><div class="aicon">👥</div>جمهوره</div><p class="atext">${d.audience||''}</p><div class="tags">${tagsHTML}</div></div>
    <div class="acard"><div class="acard-title"><div class="aicon">✍️</div>أسلوب المحتوى</div><p class="atext">${d.content_style||''}</p></div>
    <div class="verdict">
      <span class="v-emoji">${d.verdict_emoji||'🎯'}</span>
      <div class="v-title">${d.verdict_title||''}</div>
      <p class="v-text">${d.verdict_text||''}</p>
    </div>`;

  setTimeout(()=>{document.querySelectorAll('.sc-fill').forEach(el=>el.style.width=el.dataset.w+'%');},300);
  window.scrollTo({top:0,behavior:'smooth'});
}

function share(){
  const u=document.getElementById('unameInput').value.trim().replace('@','');
  const txt=`حللت شخصية @${u} بالذكاء الاصطناعي 🤖\n\nجرّب تحلل أي حساب 👇\nx-personality.vercel.app\n\n#محلل_شخصية_X`;
  window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(txt),'_blank');
}

function reset(){
  document.getElementById('results').classList.remove('on');
  document.getElementById('resultsHTML').innerHTML='';
  document.getElementById('inputSection').style.display='block';
  document.getElementById('unameInput').value='';
  document.querySelectorAll('.lstep').forEach(x=>x.classList.remove('on'));
  document.getElementById('ls0').classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
